<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="createCard">
        <h1>To-Do Card</h1>
        <form>
            <label for="dates">Select Date:</label>
            <input type="date" id="dates">
            <label for="Category">Select Category:</label>
            <select name="" id="Category">
                <option value="active">All</option>
                <option value="Home">Home</option>
                <option value="Outdoor">Outdooor</option>
                <option value="Collage">Collage</option>
                <option value="Coaching">Coaching</option>
                <option value="Family">Family</option>
                <option value="Groceries">Groceries</option>
                <option value="ImportantWork">ImportantWork</option>
                <option value="School">School</option>
                <option value="Entertenment">Entertenment</option>
            </select>
            <label for="work">What you want to do:</label>
            <input type="text" id="work">
            <label for="times">Time:</label>
            <input type="time" id="times">
            <button>Create</button>
            <a href="index.html"><button type="button">Close</button></a>
        </form>
    </div>


    <script src="form.js"></script>
</body>
</html>
